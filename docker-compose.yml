version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3099:3099"
    env_file:
      - .env.local
    environment:
      # Override DATABASE_URL to point at the postgres service when running with Docker.
      # For SQLite (default), remove this line and keep DATABASE_URL in .env.local.
      # DATABASE_URL: "postgres://postgres:postgres@postgres:5432/axum_starter"
      PORT: "3099"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: axum_starter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
